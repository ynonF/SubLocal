name: Publish Release Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }} installer
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            platform: win
            artifact: SubLocal-Windows
            path: apps/desktop/release/SubLocal-Windows-x64.exe
          - name: macOS
            os: macos-latest
            platform: mac
            artifact: SubLocal-macOS
            path: apps/desktop/release/SubLocal-macOS-*.dmg
          - name: Linux
            os: ubuntu-latest
            platform: linux
            artifact: SubLocal-Linux
            path: |
              apps/desktop/release/SubLocal-Linux-x64.AppImage
              apps/desktop/release/SubLocal-Linux-x64.deb

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build installer
        shell: pwsh
        run: ./scripts/package-platform.ps1 -Platform ${{ matrix.platform }}

      - name: Store installer for release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error

  release:
    name: Publish static downloads
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SubLocal ${{ github.ref_name }}
          body: |
            Static installer downloads for SubLocal.

            - Windows: `SubLocal-Windows-x64.exe`
            - macOS Intel: `SubLocal-macOS-x64.dmg`
            - macOS Apple Silicon: `SubLocal-macOS-arm64.dmg`
            - Linux: `SubLocal-Linux-x64.AppImage` or `SubLocal-Linux-x64.deb`
          files: release-assets/*
